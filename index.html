<!DOCTYPE html>
<html lang="en">

    <link rel="icon" href="/list_icon.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <!-- ✅ TAG STYLES ADDED HERE -->
    <style>
        .tags {
            display: flex;
            gap: 10px;
            margin: 10px 0 15px;
            flex-wrap: wrap;
        }

        .tag {
            padding: 5px 12px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 700;
            color: white;
            background: linear-gradient(135deg, #5c6cff, #8a7dff);
        }

        /* Optional colors */
        .tag-wave { background: #3aa0ff; }
        .tag-fast-paced { background: #ff6a3a; }
        .tag-skill-based { background: #9b59b6; }
    </style>

    <script src="https://unpkg.com/vue@3.2.31/dist/vue.global.js"></script>
    <script src="https://unpkg.com/vue-router@4.0.14/dist/vue-router.global.prod.js"></script>
    <script type="module" src="/js/main.js"></script>
</head>

<body id="app">
<header :class="{ dark: store.dark }">
    <div class="logo">
        <h2>BBNL</h2>
        <p>v1.3.2</p>
    </div>

<nav class="nav">
  <router-link class="nav__tab" to="/">
      <span class="type-label-lg">List</span>
  </router-link>

  <router-link class="nav__tab" to="/leaderboard">
      <span class="type-label-lg">Leaderboard</span>
  </router-link>

  <router-link class="nav__tab" to="/roulette">

</nav>

        <div class="nav__actions">
            <button class="nav__icon" @click.prevent="store.toggleDark()">
                <img
                    :src="store.dark ? '/assets/light.svg' : '/assets/dark.svg'"
                    alt=""
                />
            </button>

            <a class="nav__icon" href="#">
                <img src="/assets/discord.svg" alt="Discord Logo" />
            </a>

            <a class="nav__cta type-label-lg" href="#" target="_blank">
                Submit Record
            </a>
        </div>
    </nav>
